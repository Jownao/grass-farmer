name: 🌱 Grass Farmer

on:
  schedule:
    # Runs 3x a day at varied times (UTC — subtract 3h for BRT)
    - cron: '37 12 * * *'   # 09:37 BRT
    - cron: '15 17 * * *'   # 14:15 BRT
    - cron: '52 21 * * *'   # 18:52 BRT
  workflow_dispatch:         # Allows manual trigger from GitHub UI

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name:  Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name:  Configure Git identity
        run: |
          git config user.name "jownao"
          git config user.email "johnnywsevero@gmail.com"

      - name:  Run auto commit
        run: python auto_commit.py

      - name:  Push all commits
        run: git push